name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable)
        run: pip install -e .
      - name: Run tests
        run: python tests/test_assure.py
      - name: Smoke-test the CLI (template engine, no AWS)
        run: |
          assure frameworks
          assure report --in tests/fixtures/prowler_standard.csv --framework cps234 \
            --format md -o /tmp/ci-report --exit-zero
          test -f /tmp/ci-report.md
